<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>The Caterpillar</h1>

    <p>This is a <strong>caterpillar</strong> in its natural habitat:</p>
    <img
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Monarch_caterpillar_on_swan_plant_branchlet.jpg/960px-Monarch_caterpillar_on_swan_plant_branchlet.jpg?_=20080909013513"
      width="400"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      $("h1").text("about the butterfly");
      $("p").html("This is the <strong>butterfly</strong> in his natural habitat.");
      $("img").attr("src", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQm23atgXfUCKvExioKfTZTuiP8F39Sy_QgwYYKbs3ulaH62XoJ8qOf8x36LocCR6hUUCPxjr1W1crBF9-7GLtI5AmP_TMDro7NIdALuBhi&s=10");
      $("h1").css("color", "green");      
    </script>
  </body>
</html>
